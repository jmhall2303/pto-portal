<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Vacation Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root{
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-600:#3B6D11;--green-800:#27500A;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-600:#854F0B;
  --red-50:#FCEBEB;--red-100:#F7C1C1;--red-600:#A32D2D;--red-800:#791F1F;
  --border:#e0ddd6;--bg:#fff;--bg2:#f7f6f2;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6965;--text3:#9b9894;
  --r-md:8px;--r-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg3);color:var(--text);padding:1.5rem}
.wrap{max-width:820px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem 1.75rem}
.cal-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem}
.cal-title{font-size:18px;font-weight:600}
.nav-row{display:flex;align-items:center;gap:10px}
.cnav{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 12px;cursor:pointer;font-size:14px;color:var(--text);font-family:var(--font)}
.cnav:hover{background:var(--bg2)}
.cmonth{font-size:15px;font-weight:600;min-width:150px;text-align:center}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.li{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.ld{width:13px;height:13px;border-radius:3px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdl{text-align:center;font-size:11px;color:var(--text2);padding:4px 0;font-weight:600;text-transform:uppercase}
.cday{min-height:64px;border-radius:6px;padding:4px 5px;border:1px solid transparent;background:var(--bg)}
.cday:hover{background:var(--bg2)}
.cday.today{border-color:var(--blue-400)}
.cday.other{opacity:.28}
.cdn{font-size:11px;color:var(--text2);font-weight:500}
.cev{font-size:10px;padding:2px 5px;border-radius:3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;font-weight:600}
.refresh-row{display:flex;align-items:center;gap:10px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.last-updated{font-size:11px;color:var(--text3);flex:1}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue-600);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.mgr-section{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1rem}
.mgr-toggle{background:none;border:none;font-size:13px;color:var(--blue-600);cursor:pointer;font-family:var(--font);font-weight:500;padding:0;display:flex;align-items:center;gap:6px}
.mgr-toggle:hover{text-decoration:underline}
.panel{margin-top:1rem;background:var(--bg2);border-radius:var(--r-md);padding:1.25rem;border:1px solid var(--border)}
.panel h3{font-size:14px;font-weight:600;margin-bottom:1rem}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-md);font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none}
.field input:focus,.field select:focus{border-color:var(--blue-400)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font)}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}
.btn.pri:hover{background:var(--blue-800)}
.btn.dny{background:var(--red-600);color:#fff;border-color:var(--red-600)}
.mgr-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.mgr-bar span{font-size:13px;color:var(--text2)}
.ev-list{margin-top:1rem}
.ev-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.ev-item:last-child{border-bottom:none}
.ev-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ev-info{flex:1}
.ev-name{font-weight:600;font-size:13px}
.ev-dates{font-size:11px;color:var(--text2)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 5px;font-family:var(--font)}
.del-btn:hover{color:var(--red-600)}
.toast{background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r-md);padding:9px 14px;font-size:13px;color:var(--green-600);margin-bottom:1rem;font-weight:500;display:flex;align-items:center;gap:7px}
.err-msg{background:var(--red-50);border:1px solid var(--red-100);border-radius:var(--r-md);padding:9px 14px;font-size:13px;color:var(--red-600);margin-bottom:1rem;display:flex;align-items:center;gap:7px}
.empty{text-align:center;padding:1.5rem;color:var(--text2);font-size:13px}
.hint{font-size:11px;color:var(--text2);margin-top:.75rem;padding:8px 12px;background:var(--bg3);border-radius:var(--r-md);line-height:1.6}
.setup-notice{background:var(--amber-50);border:1px solid var(--amber-100);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px;color:var(--amber-600);line-height:1.6}
@media(max-width:520px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div id="toast-area"></div>
  <div id="setup-notice" class="setup-notice">
    <strong><i class="ti ti-alert-triangle" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Setup required:</strong>
    Replace <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace">YOUR_APPS_SCRIPT_URL_HERE</code> in the &lt;script&gt; section with your deployed Apps Script URL.
  </div>

  <div class="cal-top">
    <div class="cal-title"><i class="ti ti-calendar-month" style="font-size:18px;vertical-align:-3px;margin-right:7px;color:#185FA5"></i>Team Vacation Calendar</div>
    <div class="nav-row">
      <button class="cnav" onclick="prevMonth()" aria-label="Previous month"><i class="ti ti-chevron-left"></i></button>
      <span class="cmonth" id="cmonth-lbl"></span>
      <button class="cnav" onclick="nextMonth()" aria-label="Next month"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="legend">
    <div class="li"><div class="ld" style="background:#378ADD"></div>IN Team</div>
    <div class="li"><div class="ld" style="background:#EF9F27"></div>GA Team</div>
    <div class="li"><div class="ld" style="background:#639922"></div>Utility Team</div>
  </div>

  <div class="cgrid" id="cgrid"></div>

  <div class="refresh-row">
    <span class="last-updated" id="last-updated">Loading…</span>
    <button class="btn" style="padding:4px 10px;font-size:12px" onclick="fetchEntries(true)"><i class="ti ti-refresh"></i> Refresh</button>
  </div>

  <div class="mgr-section">
    <button class="mgr-toggle" onclick="toggleMgr()" id="mgr-toggle-btn">
      <i class="ti ti-lock" style="font-size:13px"></i>
      <span id="mgr-toggle-lbl">Manager access</span>
    </button>
    <div id="mgr-area"></div>
  </div>
</div>

<script>
// ── CONFIGURATION ───────────────────────────────────────────
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi8NsCAcajwFcQrK9FQgEYeJzyV1cMXZFMf8p5Qy5-hXyamgveFBcH-2qzhlOek3Ho/exec";
// ────────────────────────────────────────────────────────────

var TEAMS = {
  IN:   { label:"IN Team",      fill:"#B5D4F4", text:"#0C447C", dot:"#378ADD" },
  GA:   { label:"GA Team",      fill:"#FAC775", text:"#633806", dot:"#EF9F27" },
  UTIL: { label:"Utility Team", fill:"#C0DD97", text:"#27500A", dot:"#639922" }
};
var MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var calY = new Date().getFullYear();
var calM = new Date().getMonth();
var entries = [];
var mgrOpen = false;
var mgrUser = null;
var mgrName = "";
var mgrPass = "";
var mgrErr = "";

if (SCRIPT_URL !== "https://script.google.com/macros/s/AKfycbwi8NsCAcajwFcQrK9FQgEYeJzyV1cMXZFMf8p5Qy5-hXyamgveFBcH-2qzhlOek3Ho/exec") {
  document.getElementById("setup-notice").style.display = "none";
}

function renderCal() {
  document.getElementById("cmonth-lbl").textContent = MN[calM] + " " + calY;
  var first = new Date(calY, calM, 1).getDay();
  var days  = new Date(calY, calM+1, 0).getDate();
  var today = new Date();
  var h = "";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(function(d){ h += '<div class="cdl">' + d + '</div>'; });
  for (var i=0; i<first; i++) {
    var pv = new Date(calY, calM, i-first+1);
    h += '<div class="cday other"><div class="cdn">' + pv.getDate() + '</div></div>';
  }
  for (var d=1; d<=days; d++) {
    var isT = today.getFullYear()===calY && today.getMonth()===calM && today.getDate()===d;
    var ds = calY + "-" + String(calM+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    var evs = "";
    entries.forEach(function(e) {
      if (ds >= e.start && ds <= e.end) {
        var t = TEAMS[e.team] || TEAMS.IN;
        evs += '<div class="cev" style="background:' + t.fill + ';color:' + t.text + '">' + e.name.split(" ")[0] + ' \u2013 PTO</div>';
      }
    });
    h += '<div class="cday' + (isT?" today":"") + '"><div class="cdn">' + d + '</div>' + evs + '</div>';
  }
  var rem = (7-(first+days)%7)%7;
  for (var j=1; j<=rem; j++) h += '<div class="cday other"><div class="cdn">' + j + '</div></div>';
  document.getElementById("cgrid").innerHTML = h;
}

function fetchEntries(manual) {
  if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbwi8NsCAcajwFcQrK9FQgEYeJzyV1cMXZFMf8p5Qy5-hXyamgveFBcH-2qzhlOek3Ho/exec") {
    document.getElementById("last-updated").textContent = "Setup required — see notice above.";
    return;
  }
  var lu = document.getElementById("last-updated");
  lu.innerHTML = '<div class="spin" style="display:inline-block;margin-right:6px"></div>Fetching…';
  fetch(SCRIPT_URL + "?action=getRequests")
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.success) {
        entries = (data.requests || []).filter(function(r){ return r.status === "approved"; });
        renderCal();
        lu.textContent = "Last updated: " + new Date().toLocaleTimeString();
        if (manual) showToast("Calendar refreshed — " + entries.length + " approved PTO entries loaded.");
      } else {
        lu.textContent = "Error: " + (data.error || "unknown");
      }
    })
    .catch(function(err) {
      lu.textContent = "Error: " + err.message;
    });
}

function prevMonth(){ calM--; if(calM<0){calM=11;calY--;} renderCal(); }
function nextMonth(){ calM++; if(calM>11){calM=0;calY++;} renderCal(); }

function showToast(msg){
  var el = document.getElementById("toast-area");
  el.innerHTML = '<div class="toast"><i class="ti ti-circle-check"></i>' + msg + '</div>';
  setTimeout(function(){ el.innerHTML=""; }, 3500);
}

function toggleMgr() {
  mgrOpen = !mgrOpen;
  document.getElementById("mgr-toggle-lbl").textContent = mgrOpen ? (mgrUser ? "Hide manager panel" : "Manager login") : "Manager access";
  renderMgrArea();
}

function renderMgrArea() {
  var el = document.getElementById("mgr-area");
  if (!mgrOpen) { el.innerHTML = ""; return; }
  if (!mgrUser) {
    el.innerHTML = '<div class="panel">' +
      '<h3><i class="ti ti-lock" style="font-size:14px;vertical-align:-2px;margin-right:5px;color:#185FA5"></i>Manager sign in</h3>' +
      '<div class="field"><label>Username</label><input type="text" id="lu" placeholder="Your username"></div>' +
      '<div class="field"><label>Password</label><input type="password" id="lp" placeholder="Your password" onkeydown="if(event.key===\'Enter\')mgrLogin()"></div>' +
      (mgrErr ? '<div class="err-msg" style="margin-bottom:.75rem"><i class="ti ti-alert-circle"></i>' + mgrErr + '</div>' : '') +
      '<button class="btn pri" onclick="mgrLogin()"><i class="ti ti-login"></i> Sign in</button>' +
      '<div class="hint">Credentials are defined in <strong>Code.gs</strong> under <code>MANAGER_CREDENTIALS</code>.</div>' +
      '</div>';
  } else {
    var h = '<div class="panel">' +
      '<div class="mgr-bar"><span>Signed in as <strong>' + mgrName + '</strong></span>' +
      '<button class="btn" style="padding:4px 10px;font-size:12px" onclick="mgrLogout()"><i class="ti ti-logout"></i> Sign out</button></div>' +
      '<h3><i class="ti ti-calendar-plus" style="font-size:14px;vertical-align:-2px;margin-right:5px;color:#185FA5"></i>Manually add approved PTO</h3>' +
      '<div class="field"><label>Employee name</label><input type="text" id="an" placeholder="Full name"></div>' +
      '<div class="field"><label>Team</label><select id="at"><option value="IN">IN Team</option><option value="GA">GA Team</option><option value="UTIL">Utility Team</option></select></div>' +
      '<div class="row2">' +
        '<div class="field"><label>Start date</label><input type="date" id="as"></div>' +
        '<div class="field"><label>End date</label><input type="date" id="ae"></div>' +
      '</div>' +
      '<button class="btn pri" onclick="addEntry()"><i class="ti ti-plus"></i> Add to calendar</button>';
    if (!entries.length) {
      h += '<p class="empty" style="padding:1rem 0">No approved entries yet.</p>';
    } else {
      h += '<div class="ev-list">';
      entries.forEach(function(e) {
        var t = TEAMS[e.team] || TEAMS.IN;
        h += '<div class="ev-item">' +
          '<div class="ev-dot" style="background:' + t.dot + '"></div>' +
          '<div class="ev-info"><div class="ev-name">' + e.name + '</div>' +
          '<div class="ev-dates">' + t.label + ' &middot; ' + fmt(e.start) + ' &ndash; ' + fmt(e.end) + '</div></div>' +
          '<button class="del-btn" onclick="removeEntry(\'' + e.id + '\')" title="Remove"><i class="ti ti-trash"></i></button></div>';
      });
      h += '</div>';
    }
    h += '</div>';
    el.innerHTML = h;
  }
}

function mgrLogin() {
  var u = document.getElementById("lu").value.trim().toLowerCase();
  var p = document.getElementById("lp").value;
  if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbwi8NsCAcajwFcQrK9FQgEYeJzyV1cMXZFMf8p5Qy5-hXyamgveFBcH-2qzhlOek3Ho/exec") { mgrErr = "SCRIPT_URL not configured."; renderMgrArea(); return; }
  fetch(SCRIPT_URL, { method:"POST", body: JSON.stringify({ action:"managerLogin", username:u, password:p }) })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if (res.success) { mgrUser=u; mgrName=res.name; mgrPass=p; mgrErr=""; document.getElementById("mgr-toggle-lbl").textContent="Hide manager panel"; renderMgrArea(); }
      else { mgrErr = res.error || "Invalid credentials."; renderMgrArea(); }
    });
}
function mgrLogout() { mgrUser=null; mgrName=""; mgrPass=""; mgrErr=""; document.getElementById("mgr-toggle-lbl").textContent="Manager login"; renderMgrArea(); }

function fmt(s){ return s ? new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : ""; }

function addEntry() {
  var name  = document.getElementById("an").value.trim();
  var team  = document.getElementById("at").value;
  var start = document.getElementById("as").value;
  var end   = document.getElementById("ae").value;
  if (!name||!start||!end) { alert("Please fill in all fields."); return; }
  if (end < start) { alert("End date must be on or after start date."); return; }
  entries.push({ id: "M-"+Date.now(), name:name, team:team, start:start, end:end });
  showToast(name + "'s PTO added to the calendar.");
  renderCal(); renderMgrArea();
}

function removeEntry(id) {
  var e = entries.find(function(x){ return x.id===id; });
  if (e && confirm("Remove " + e.name + "'s PTO entry?")) {
    entries = entries.filter(function(x){ return x.id!==id; });
    renderCal(); renderMgrArea();
  }
}

// Auto-refresh every 60 seconds
fetchEntries(false);
setInterval(function(){ fetchEntries(false); }, 60000);
</script>
</body>
</html>
